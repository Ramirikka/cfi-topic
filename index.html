    <style>
      /* Restore left-to-right brand gradient overlay on the preview frame.
         Uses ::after so React re-renders cannot remove it.
         Colors: #050044 -> #0A008F (brand navy/indigo), matching Newsletter Cover Image. */
      .preview-frame::after {
        content: '';
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 2;
        background: linear-gradient(
          90deg,
          rgba(5,   0,  68, 0.80)   0%,
          rgba(9,   0, 122, 0.51)  15%,
          rgba(9,   0, 130, 0.29)  30%,
          rgba(10,  0, 136, 0.13)  45%,
          rgba(10,  0, 140, 0.03)  60%,
          rgba(10,  0, 143, 0.00)  75%,
          rgba(10,  0, 143, 0.00) 100%
        );
      }
    </style>
  <script>
    // Patch canvas toBlob for the 690x254 export canvas to:
    // 1. Composite onto a solid background (no alpha/transparency)
    // 2. Draw the brand gradient on top
    // This produces a fully opaque PNG that CMSes accept (same as Paint-saved PNG).
    (function () {
      var _toBlob = HTMLCanvasElement.prototype.toBlob;
      HTMLCanvasElement.prototype.toBlob = function (callback, type, quality) {
        if (this.width === 690 && this.height === 254) {
          // Create a flat canvas with solid background — no alpha channel pixels
          var flat = document.createElement('canvas');
          flat.width = 690;
          flat.height = 254;
          var ctx = flat.getContext('2d');

          // 1. Fill with solid black so every pixel is fully opaque
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, 690, 254);

          // 2. Draw the original canvas (with all its layers) on top
          ctx.drawImage(this, 0, 0);

          // 3. Draw the brand gradient on top
          var grad = ctx.createLinearGradient(0, 0, 690, 0);
          grad.addColorStop(0.00, 'rgba(5,   0,  68, 0.80)');
          grad.addColorStop(0.15, 'rgba(9,   0, 122, 0.51)');
          grad.addColorStop(0.30, 'rgba(9,   0, 130, 0.29)');
          grad.addColorStop(0.45, 'rgba(10,  0, 136, 0.13)');
          grad.addColorStop(0.60, 'rgba(10,  0, 140, 0.03)');
          grad.addColorStop(0.75, 'rgba(10,  0, 143, 0.00)');
          grad.addColorStop(1.00, 'rgba(10,  0, 143, 0.00)');
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, 690, 254);

          // 4. Export the flat canvas instead of the original
          return _toBlob.call(flat, callback, type, quality);
        }
        return _toBlob.call(this, callback, type, quality);
      };
    })();
  </script>
